name: laughter
on:
  push:
    branches: [ "main" ]

jobs:
    broadcast_considering:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: broadcast_considering
          run: |
            npm install
            timeout 316m node laughter.js
  
