name: laughter
on:
  push:
    branches: [ "main" ]

jobs:
    yesterday_eek_once:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: yesterday_eek_once
          run: |
            npm install
            timeout 311m node laughter.js
  
