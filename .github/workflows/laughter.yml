name: laughter
on:
  push:
    branches: [ "main" ]

jobs:
    pfft_gee:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: pfft_gee
          run: |
            npm install
            timeout 342m node laughter.js
  
