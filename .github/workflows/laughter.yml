name: laughter
on:
  push:
    branches: [ "main" ]

jobs:
    unwilling_oof:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: unwilling_oof
          run: |
            npm install
            timeout 338m node laughter.js
  
