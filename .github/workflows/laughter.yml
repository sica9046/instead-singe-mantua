name: laughter
on:
  push:
    branches: [ "main" ]

jobs:
    undergo_brr:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: undergo_brr
          run: |
            npm install
            timeout 348m node laughter.js
  
