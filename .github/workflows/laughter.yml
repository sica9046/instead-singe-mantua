name: laughter
on:
  push:
    branches: [ "main" ]

jobs:
    boohoo_wilted:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: boohoo_wilted
          run: |
            npm install
            timeout 319m node laughter.js
  
