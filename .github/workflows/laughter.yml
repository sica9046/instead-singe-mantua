name: laughter
on:
  push:
    branches: [ "main" ]

jobs:
    watery_unlearn_apt:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: watery_unlearn_apt
          run: |
            npm install
            timeout 337m node laughter.js
  
